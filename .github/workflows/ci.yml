name: AI Ops Reliability CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: ruff check app tests evaluations seed_demo.py
      - run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=70
      - run: python evaluations/run_evaluations.py
      - uses: actions/upload-artifact@v7
        with:
          name: llm-evaluation-results
          path: backend/evaluations/results.json

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  migrations-and-containers:
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - run: alembic -c alembic.ini upgrade head
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./migration-test.db
      - run: cp .env.example .env
      - run: docker compose config
      - run: docker compose -f docker-compose.prod.yml config
        env:
          POSTGRES_DB: aiops
          POSTGRES_USER: aiops
          POSTGRES_PASSWORD: ${{ github.run_id }}
          JWT_SECRET: ${{ github.sha }}
          CORS_ORIGINS: https://example.com
          PUBLIC_API_BASE_URL: https://api.example.com
