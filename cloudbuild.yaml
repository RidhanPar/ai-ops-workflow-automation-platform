steps:
  # Build the backend image.
  # Tag with both the commit SHA (immutable, for traceability) and latest
  # (used as a layer cache source on the next build).
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=backend/Dockerfile
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
      - --cache-from=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - ./backend

  # Push both tags so the SHA tag is the canonical deployment artifact and
  # latest is available for cache-from on the next build.
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
    waitFor: [build]

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
    waitFor: [build]

  # Deploy the SHA-tagged image to Cloud Run.
  # Using the SHA tag (not latest) ensures every deployment is pinned to an
  # exact, auditable image digest.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --quiet
    waitFor: [push-sha]

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: aiops-backend
  _REPO: aiops-backend

# Publish both image tags to Artifact Registry (Cloud Build artifact tracking).
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  # Enable BuildKit for --cache-from support and faster layer builds.
  env:
    - DOCKER_BUILDKIT=1

timeout: 1200s
