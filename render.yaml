databases:
  - name: ai-ops-postgres
    databaseName: aiops
    user: aiops
    plan: free

services:
  - type: web
    name: ai-ops-api
    runtime: docker
    rootDir: backend
    plan: free
    dockerCommand: alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-ops-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_SEED_ENABLED
        value: "false"

  - type: web
    name: ai-ops-dashboard
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ai-ops-api.onrender.com
