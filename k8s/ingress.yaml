apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-ops-ingress
  namespace: ai-ops
  labels:
    app.kubernetes.io/part-of: ai-ops-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  tls:
    - hosts:
        - ai-ops.your-domain.com
      secretName: ai-ops-tls
  rules:
    - host: ai-ops.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-ops-api-service
                port:
                  number: 8000
