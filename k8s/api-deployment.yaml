apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ops-api
  namespace: ai-ops
  labels:
    app: ai-ops-api
    app.kubernetes.io/part-of: ai-ops-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-ops-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ai-ops-api
    spec:
      containers:
        - name: api
          image: ghcr.io/ridhanpar/ai-ops-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            # DB_PASSWORD must be declared before DATABASE_URL so K8s
            # variable substitution $(DB_PASSWORD) resolves correctly.
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-ops-secrets
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+psycopg2://aiops_user:$(DB_PASSWORD)@postgres-service:5432/aiops_db"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-ops-secrets
                  key: JWT_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-ops-secrets
                  key: ANTHROPIC_API_KEY
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: ai-ops-config
                  key: LOG_LEVEL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: ai-ops-config
                  key: CORS_ORIGINS
            - name: DEMO_SEED_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: ai-ops-config
                  key: DEMO_SEED_ENABLED
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
