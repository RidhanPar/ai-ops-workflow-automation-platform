services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: aiops_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - N8N_SECURE_COOKIE=false
      - N8N_LOG_LEVEL=info
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - aiops_network

networks:
  aiops_network:
    external: true
    name: ai-ops-automation-platform_default

volumes:
  n8n_data:
